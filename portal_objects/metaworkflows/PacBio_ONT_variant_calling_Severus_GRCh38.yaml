## Pipeline information #####################################
#     General information for the pipeline
#############################################################
name: PacBio_ONT_variant_calling_Severus_GRCh38
description: Run Severus for germline and somatic variant calling using PacBio or ONT long read data. |
             Accepts an input CRAM file and produces final calls in VCF format.

category:
  - Variant Calling

## General arguments ########################################
#     Pipeline input, reference files, and general arguments
#       define all arguments for the pipeline here
#############################################################
input:

  # File inputs
  input_file_cram:
    argument_type: file.cram
    dimensionality: 0

  tandem_repeats_bed:
    argument_type: file.bed
    files:
      - severus-tandem-repeat-regions@GRCh38

  # Optional parameter inputs
  nthreads:
    argument_type: parameter.integer
    value: 16

## Workflows and dependencies ###############################
#     Information for the workflows and their dependencies
#############################################################
workflows:

  ## Workflow definition #####################
  #  severus_compress_index
  ############################################
  severus_compress_index:

    ## Specific arguments ##############
    ####################################
    input:

      # File arguments
      input_file_cram:
        argument_type: file.cram

      tandem_repeats_bed:
        argument_type: file.bed

      # Parameter arguments
      nthreads:
        argument_type: parameter.integer

    ## Output ##############################
    #     Output files for the workflow
    ########################################
    output:

      # File output
      output_file_vcf_gz:
        description: Severus output VCF
        data_category:
          - Germline Variant Calls
          - Somatic Variant Calls
        data_type:
          - SV
        output_status: Final Output
        # These fields are required to link metadata for the naming
        software:
          - smaht:Software-Severus_v1.6
        reference_genome: GRCh38

    ## EC2 Configuration to use ########
    ####################################
    config:
      instance_type: # TODO: Update instance types
        - r5.8xlarge
        - r5n.8xlarge
        - r5a.8xlarge
        - r6i.8xlarge
        - r6a.8xlarge
        - r7i.8xlarge
        - r7a.8xlarge
        - r8i.8xlarge
        - r8a.8xlarge
      ebs_size: "1.5x"
      ebs_optimized: True
      spot_instance: True
      run_name: run_severus_compress_index
      behavior_on_capacity_limit: wait_and_retry